version: "3.9"

services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  user-service:
    build: ./services/user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  product-service:
    build: ./services/product-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  order-service:
    build: ./services/order-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  cart-service:
    build: ./services/cart-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  messaging-service:
    build: ./services/messaging-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  notification-service:
    build: ./services/notification-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  payment-service:
    build: ./services/payment-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=default

