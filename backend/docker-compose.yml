      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  messaging-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "messaging-service"
        MODULE_PATH: "services/messaging-service"
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messagingdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-maf}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: messaging
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/actuator/health" ]
      interval: 30s
      timeout: 10s
