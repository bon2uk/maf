      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "cart-service"
        MODULE_PATH: "services/cart-service"
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cartdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-maf}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: cart
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
