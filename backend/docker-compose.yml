version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: maf
      POSTGRES_PASSWORD: maf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maf"]
      interval: 5s
      timeout: 5s
      retries: 5
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "auth-service"
        MODULE_PATH: "services/auth-service"
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: auth
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ~/.m2:/root/.m2

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "user-service"
        MODULE_PATH: "services/user-service"
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env


  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "product-service"
        MODULE_PATH: "services/product-service"
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: product
    depends_on:
      - postgres
    env_file:
      - .env

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "order-service"
        MODULE_PATH: "services/order-service"
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: "order"
    depends_on:
      - postgres
    env_file:
      - .env

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "cart-service"
        MODULE_PATH: "services/cart-service"
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cartdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: cart
    depends_on:
      - postgres
    env_file:
      - .env

  messaging-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "messaging-service"
        MODULE_PATH: "services/messaging-service"
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messagingdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: messaging
    depends_on:
      - postgres
    env_file:
      - .env

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "notification-service"
        MODULE_PATH: "services/notification-service"
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: notification
    depends_on:
      - postgres
    env_file:
      - .env

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: "payment-service"
        MODULE_PATH: "services/payment-service"
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: payment
    depends_on:
      - postgres
    env_file:
      - .env
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  pgdata: