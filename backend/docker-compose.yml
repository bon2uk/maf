version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maf
      POSTGRES_PASSWORD: maf
      POSTGRES_DB: maf
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maf -d maf"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/maf
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: auth
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/maf
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: "user"
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./services/product-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/maf
      SPRING_DATASOURCE_USERNAME: maf
      SPRING_DATASOURCE_PASSWORD: maf
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: product
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    ports:
      - "8084:8084"
