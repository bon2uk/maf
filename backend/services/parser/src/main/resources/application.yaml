server:
  port: 8092

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parserdb}
    username: ${SPRING_DATASOURCE_USERNAME:maf}
    password: ${SPRING_DATASOURCE_PASSWORD:maf}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: parser-service

parser:
  llm:
    base-url: ${LLM_SERVICE_URL:http://llm-service:8091}
    internal-token: ${LLM_INTERNAL_TOKEN:?LLM_INTERNAL_TOKEN is required}
    connect-timeout: 3s
    read-timeout: 60s
    # Total attempts (1 original + retries). We only retry transport errors
    # and 5xx; 4xx aborts immediately because retries won't fix a bad
    # request.
    max-attempts: 2
  outbox:
    poll-delay-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  swagger-ui:
    path: /swagger-ui
